version: '3.8'

services:
  mysql:
    image: mysql:9.6
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: world123
      MYSQL_DATABASE: world
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d

  app:
    build: .
    depends_on:
      - mysql
    environment:
      DB_CONNECTION: "Server=mysql;Database=world;User=root;Password=world123;Port=3306;"
    stdin_open: true
    tty: true

volumes:
  mysql_data:
